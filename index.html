<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="xkPnsL8Y_YzBn72F3ANCanlndL_vlA01l4wWiaHrMO8" />
    <title>Kent & KClaw Studio</title>
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* 超炫的動態深色漸層背景 */
            background: linear-gradient(-45deg, #0d1117, #161b22, #0d1b2a, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #58a6ff, #d2a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }
        p {
            font-size: 1.2rem;
            color: #8b949e;
            max-width: 600px;
            line-height: 1.6;
        }
        .container {
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #484f58;
        }
        .btn-group {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            color: #ffffff;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: bold;
            border: none;
        }
        .btn-github {
            background-color: #24292e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-github:hover {
            background-color: #2ea44f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 164, 79, 0.4);
        }
        .btn-youtube {
            background-color: #24292e; /* 預設深色，hover 變紅 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-youtube:hover {
            background-color: #ff0000;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }
        
        /* 讓 icon 稍微大一點 */
        .btn i {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kent & KClaw Studio</h1>
        <p>Innovation meets Intelligence.</p>
        <p>We build the future, one line of code at a time.</p>
        <div class="btn-group">
            <a href="https://github.com/skybomb77" class="btn btn-github" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://www.youtube.com/@KentKClawStudio" class="btn btn-youtube" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>
    </div>
    <div class="footer">
        &copy; 2026 Kent & KClaw. All rights reserved. <br> Powered by OpenClaw 🐯
    </div>
</body>
</html>
